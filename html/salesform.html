<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Registration</title>
<link rel="stylesheet" href="sales.css">
</head>
<body>
<div class="container">
    <h2>Register New Sales</h2>
    <form>
        <div class="row">
            <div class="input-box">
                <label>Date</label>
                <input type="date" name="date">
            </div>

            <div class="input-box">
                <label>Customer Name</label>
                <input type="text" placeholder="Enter customer name" name="customerName">
            </div>
        </div>
        <div class="row">
            <div class="input-box">
                <label>Customer Address</label>
                <input type="text" placeholder="Enter address" name="customerAddress">
            </div>
            <div class="input-box">
                <label>Customer Distance (KM)</label>
                <input type="number" placeholder="Enter distance" name="customerDistance">
            </div>
        </div>
        <div class="row">
            <div class="input-box">
                <label>Phone Number</label>
                <input type="text" placeholder="Enter phone number" name="phoneNumber">
            </div>
            <div class="input-box">
                <label>Item Name</label>
                <select name="itemName">
                    <option>Wheelbarrow</option>
                    <option>Nails 1 inch</option>
                    <option>Iron sheets</option>
                    <option>Wire mesh</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="input-box">
                <label>Quantity</label>
                <input type="number" name="quantity">
            </div>
            <div class="input-box">
                <label>Unit Price</label>
                <input type="number" name="unitPrice">
            </div>
        </div>
        <div class="row">
            <div class="input-box">
                <label>Transport Charge</label>
                <input type="number" placeholder="Enter transport charge" name="transportCharge">
            </div>
            <div class="input-box">
                <label>Total Charge</label>
                <input type="number" placeholder="Enter total charge" name="totalCharge">
            </div>
        </div>
        <div class="row">
            <div class="input-box">
                <label>Payment Method</label>
                <select name="paymentMethod">
                    <option>Cash</option>
                    <option>Mobile Money</option>
                    <option>Bank</option>
                </select>
            </div>
            <div class="input-box">
                <label>Action</label>
                <select>
                    <option>Edit</option>
                    <option>Delete</option>
                </select>
            </div>
        </div>
        <button type="submit">Submit Sales</button>
    </form>
</div>
</body>
</html>
