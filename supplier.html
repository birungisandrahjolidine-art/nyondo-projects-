<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nyondo Supplier Form</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #1e3a8a;
    }

    label {
      font-weight: bold;
      margin-top: 10px;
      display: block;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: #1e3a8a;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    .row div {
      flex: 1;
    }

    .radio-group {
      display: flex;
      gap: 20px;
      margin-top: 8px;
    }

    .radio-group div {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: orange;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>Supplier Registration form</h2>

    <form>
<label for="date">Date</label>
<input type="date" placeholder="Date" required>
      <label>Supplier Name</label>
      <input type="text" placeholder="Enter supplier name" required>

      <label>Company Name</label>
      <input type="text" placeholder="Enter company name">

      <label>Phone Number</label>
      <input type="tel" placeholder="07XXXXXXXX" required>

      <label>Email</label>
      <input type="email" placeholder="supplier@email.com">

      <label>Product Details</label>
      <input type="text" placeholder="Product Type e.g Cement, Nails">

      <div class="row">
        <div>
          <label>Quantity</label>
          <input type="number" placeholder="e.g 50">
        </div>

        <div>
          <label>Unit Type</label>
          <input type="text" placeholder="e.g bags, boxes, kg">
        </div>
      </div>

      <label>Payment Method</label>
      <div class="radio-group">
        <div>
          <input type="radio" name="payment" value="cash" id="cash">
          <label for="cash">Cash</label>
        </div>

        <div>
          <input type="radio" name="payment" value="credit" id="credit">
          <label for="credit">Credit</label>
        </div>
      </div>

      <label>Location</label>
      <input type="text" placeholder="Supplier location">

      <label>Notes</label>
      <textarea rows="4" placeholder="Any extra details..."></textarea>

      <button type="submit">Save Supplier</button>

    </form>
  </div>

</body>
</html>
    
</body>
</html>
