<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyondo stock hardware logout page</title>
</head>
<body>
    <style>
        body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, #2c3e50, #3498db);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logout-container {
    background: white;
    padding: 40px;
    text-align: center;
    border-radius: 10px;
    box-shadow: 0 4px 15px blue;
    width: 350px;
}

.logout-container h1 {
    color: rgb(46, 46, 114);
    margin-bottom: 10px;
}

.logout-container p {
    color: #555;
    margin-bottom: 20px;
}

.btn {
    text-decoration: none;
    background: #3498db;
    color: white;
    padding: 10px 20px;
    border-radius: 5px;
    transition: 0.3s;
}

.btn:hover {
    background: #1b92e2;
}
    </style>
    <div class="logout-container">
        <h1>you have logged out</h1>
        <p>Thank you for using nyondo stock hardware system</p>
        <a href ="login.html">Login Again</a>
    </div>
</body>
</html>
