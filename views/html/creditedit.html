<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Credit</title>

  <link rel="stylesheet" href="/css/creditedit.css">
</head>
<body>

  <div class="container">

    <h2>Edit Credit</h2>

    <form>
      <div class="form-group">
        <label>Date</label>

        <input 
          type="date"
          name="date"
          required
        >
      </div>
      <div class="form-group">
        <label>Amount Deposited</label>

        <input
          type="number"
          name="amountDeposited"
          placeholder="Enter amount deposited"
          required
        >
      </div>

      <button type="submit">Update Credit</button>

    </form>

  </div>

</body>
</html>
